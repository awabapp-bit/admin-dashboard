<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>الحسابات — لوحة تحكم أواب</title>
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="admin-nav" id="adminNav"></nav>

<main class="admin-page">
  <h1 class="page-title">الحسابات المسجّلة</h1>
  <p class="page-sub">كل المستخدمين المسجّلين على المنصة</p>

  <div class="field" style="max-width:320px;">
    <input type="text" id="searchBox" placeholder="ابحث بالاسم أو البريد الإلكتروني...">
  </div>

  <div class="stat-grid" id="statGrid"></div>

  <div class="table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th>الاسم</th>
          <th>البريد الإلكتروني</th>
          <th>النقاط</th>
          <th>تاريخ التسجيل</th>
          <th>إجراءات</th>
        </tr>
      </thead>
      <tbody id="usersTableBody">
        <tr><td colspan="5"><div class="center-loading" style="min-height:120px;"><div class="loader"></div></div></td></tr>
      </tbody>
    </table>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="icons.js"></script>
<script src="admin-shell.js"></script>
<script>
  let allUsers = [];

  requireAdminAuth(function () {
    renderAdminNav('users');
    loadUsers();
  });

  function loadUsers() {
    db.ref('users').on('value', function (snap) {
      const data = snap.val() || {};
      allUsers = Object.keys(data)
        .map(function (uid) { return Object.assign({ uid: uid }, data[uid]); })
        .filter(function (u) { return u.email !== 'admin@awab-platform.system'; })
        .sort(function (a, b) { return (b.createdAt || 0) - (a.createdAt || 0); });
      renderStats();
      renderTable(allUsers);
    });
  }

  function renderStats() {
    const totalPoints = allUsers.reduce(function (sum, u) { return sum + (u.points || 0); }, 0);
    document.getElementById('statGrid').innerHTML =
      '<div class="stat-card"><div class="stat-icon">' + icon('users', 'icon-md') + '</div><div><div class="stat-value">' + allUsers.length + '</div><div class="stat-label">حساب مسجّل</div></div></div>' +
      '<div class="stat-card"><div class="stat-icon">' + icon('star', 'icon-md') + '</div><div><div class="stat-value">' + totalPoints + '</div><div class="stat-label">إجمالي النقاط الموزّعة</div></div></div>';
  }

  function renderTable(list) {
    const body = document.getElementById('usersTableBody');
    if (list.length === 0) {
      body.innerHTML = '<tr><td colspan="5" style="text-align:center; color:var(--text-muted); padding:30px;">لا توجد نتائج</td></tr>';
      return;
    }
    body.innerHTML = list.map(function (u) {
      const blocked = u.blocked === true;
      return '<tr>' +
        '<td>' + escapeHtml(u.name || '—') +
          (u.isAdmin ? '<span class="admin-badge-pill">مسؤول</span>' : '') +
          (blocked ? '<span class="status-chip blocked">' + icon('lock', 'icon-sm') + ' محظور</span>' : '') +
        '</td>' +
        '<td>' + escapeHtml(u.email || '—') + '</td>' +
        '<td>' + (u.points || 0) + '</td>' +
        '<td>' + formatArabicDate(u.createdAt) + '</td>' +
        '<td>' +
          '<div style="display:flex; gap:6px; flex-wrap:wrap;">' +
            '<a class="btn btn-outline btn-xs" href="user-detail.html?uid=' + u.uid + '">' + icon('eye', 'icon-sm') + ' عرض</a>' +
            (u.isAdmin ? '' :
              '<button class="btn btn-outline btn-xs reset-btn" data-uid="' + u.uid + '" data-name="' + escapeHtml(u.name || '') + '">' + icon('hourglass', 'icon-sm') + ' إعادة تعيين النقاط</button>' +
              '<button class="btn ' + (blocked ? 'btn-primary' : 'btn-ghost') + ' btn-xs block-btn" data-uid="' + u.uid + '" data-blocked="' + blocked + '" data-name="' + escapeHtml(u.name || '') + '">' +
                icon('lock', 'icon-sm') + ' ' + (blocked ? 'إلغاء الحظر' : 'حظر الحساب') +
              '</button>'
            ) +
          '</div>' +
        '</td>' +
      '</tr>';
    }).join('');

    body.querySelectorAll('.reset-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const uid = btn.dataset.uid;
        if (!confirm('هل تريد إعادة تعيين كل نقاط "' + btn.dataset.name + '" إلى صفر؟ سيتم مسح كل تقدّمه في كل المسابقات ولا يمكن التراجع.')) return;
        Promise.all([db.ref('users/' + uid + '/points').set(0), db.ref('userProgress/' + uid).remove()])
          .catch(function (err) { alert('تعذر إعادة التعيين: ' + err.message); });
      });
    });

    body.querySelectorAll('.block-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        const uid = btn.dataset.uid;
        const currentlyBlocked = btn.dataset.blocked === 'true';
        const msg = currentlyBlocked
          ? 'إلغاء حظر "' + btn.dataset.name + '"؟ سيتمكن من الدخول للمنصة مرة أخرى.'
          : 'حظر "' + btn.dataset.name + '"؟ لن يتمكن من الدخول للمنصة حتى تُلغي الحظر.';
        if (!confirm(msg)) return;
        db.ref('users/' + uid + '/blocked').set(!currentlyBlocked).catch(function (err) { alert('تعذر تنفيذ الإجراء: ' + err.message); });
      });
    });
  }

  document.getElementById('searchBox').addEventListener('input', function () {
    const q = this.value.trim().toLowerCase();
    if (!q) { renderTable(allUsers); return; }
    renderTable(allUsers.filter(function (u) {
      return (u.name || '').toLowerCase().includes(q) || (u.email || '').toLowerCase().includes(q);
    }));
  });
</script>
</body>
</html>
