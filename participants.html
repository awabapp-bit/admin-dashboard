<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>المشتركون — لوحة تحكم أواب</title>
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="admin-nav" id="adminNav"></nav>

<main class="admin-page">
  <a class="back-link" id="backLink" href="home.html">رجوع للمسابقة</a>
  <h1 class="page-title" id="compTitle">المشتركون والنقاط</h1>
  <p class="page-sub">كل مستخدم شارك في هذه المسابقة والنقاط التي جمعها</p>

  <div class="stat-grid" id="statGrid"></div>

  <div class="table-wrap">
    <table class="data-table">
      <thead>
        <tr><th>#</th><th>الاسم</th><th>البريد الإلكتروني</th><th>محاضرات مكتملة</th><th>النقاط بهذه المسابقة</th></tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="5"><div class="center-loading" style="min-height:120px;"><div class="loader"></div></div></td></tr>
      </tbody>
    </table>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="icons.js"></script>
<script src="admin-shell.js"></script>
<script>
  document.getElementById('backLink').innerHTML = icon('arrowRight', 'icon-sm') + ' رجوع للمسابقة';

  const params = new URLSearchParams(window.location.search);
  const compId = params.get('id');
  if (!compId) window.location.href = 'home.html';

  requireAdminAuth(function () {
    renderAdminNav('home');
    document.getElementById('backLink').href = 'competition.html?id=' + encodeURIComponent(compId);
    load();
  });

  function load() {
    Promise.all([
      db.ref('competitions/' + compId).once('value'),
      db.ref('users').once('value'),
      db.ref('userProgress').once('value')
    ]).then(function (results) {
      const comp = results[0].val();
      const users = results[1].val() || {};
      const allProgress = results[2].val() || {};
      if (!comp) { window.location.href = 'home.html'; return; }
      document.getElementById('compTitle').textContent = 'مشتركو: ' + (comp.title || 'المسابقة');

      const rows = [];
      Object.keys(allProgress).forEach(function (uid) {
        const compProgress = allProgress[uid] ? allProgress[uid][compId] : null;
        if (!compProgress) return;

        const lessonIds = Object.keys(compProgress);
        let points = 0;
        let completedCount = 0;
        lessonIds.forEach(function (lid) {
          const lp = compProgress[lid];
          if (lp.completed) { completedCount++; points += lp.earnedPoints || 0; }
        });
        if (completedCount === 0 && points === 0) return;

        const user = users[uid] || {};
        rows.push({ uid: uid, name: user.name || 'مستخدم محذوف', email: user.email || '—', completedCount: completedCount, points: points });
      });

      rows.sort(function (a, b) { return b.points - a.points; });
      renderStats(rows);
      renderTable(rows);
    });
  }

  function renderStats(rows) {
    const totalPoints = rows.reduce(function (s, r) { return s + r.points; }, 0);
    document.getElementById('statGrid').innerHTML =
      '<div class="stat-card"><div class="stat-icon">' + icon('users', 'icon-md') + '</div><div><div class="stat-value">' + rows.length + '</div><div class="stat-label">مشترك</div></div></div>' +
      '<div class="stat-card"><div class="stat-icon">' + icon('star', 'icon-md') + '</div><div><div class="stat-value">' + totalPoints + '</div><div class="stat-label">إجمالي النقاط الموزّعة</div></div></div>';
  }

  function renderTable(rows) {
    const body = document.getElementById('tableBody');
    if (rows.length === 0) {
      body.innerHTML = '<tr><td colspan="5" style="text-align:center; color:var(--text-muted); padding:30px;">لا يوجد مشتركون بعد في هذه المسابقة</td></tr>';
      return;
    }
    body.innerHTML = rows.map(function (r, i) {
      const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
      return '<tr>' +
        '<td><span class="rank-badge ' + rankClass + '">' + (i + 1) + '</span></td>' +
        '<td>' + escapeHtml(r.name) + '</td>' +
        '<td>' + escapeHtml(r.email) + '</td>' +
        '<td>' + r.completedCount + '</td>' +
        '<td><strong>' + r.points + '</strong></td>' +
      '</tr>';
    }).join('');
  }
</script>
</body>
</html>
