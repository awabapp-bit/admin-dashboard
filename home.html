<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>لوحة تحكم أواب — المسابقات</title>
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="admin-nav" id="adminNav"></nav>

<main class="admin-page">
  <div class="admin-page-head">
    <div>
      <h1 class="page-title">المسابقات</h1>
      <p class="page-sub">إدارة المسابقات والمحاضرات (فيديوهات و/أو اختبارات)</p>
    </div>
    <a href="add-competition.html" class="btn btn-gold" style="width:auto;" id="addBtn">إضافة مسابقة جديدة</a>
  </div>

  <div class="stat-grid" id="statGrid"></div>

  <div id="compsList">
    <div class="center-loading"><div class="loader"></div></div>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="icons.js"></script>
<script src="admin-shell.js"></script>
<script>
  document.getElementById('addBtn').innerHTML = icon('plus') + ' إضافة مسابقة جديدة';

  requireAdminAuth(function () {
    renderAdminNav('home');
    loadStats();
    loadCompetitions();
  });

  function loadStats() {
    Promise.all([db.ref('competitions').once('value'), db.ref('users').once('value')]).then(function (results) {
      const comps = results[0].val() || {};
      const users = results[1].val() || {};
      let lessonCount = 0;
      Object.keys(comps).forEach(function (cid) {
        lessonCount += comps[cid].lessons ? Object.keys(comps[cid].lessons).length : 0;
      });
      document.getElementById('statGrid').innerHTML =
        statCard('trophy', Object.keys(comps).length, 'مسابقة') +
        statCard('listCheck', lessonCount, 'محاضرة') +
        statCard('users', Math.max(Object.keys(users).length - 1, 0), 'حساب مستخدم');
    });
  }

  function statCard(iconName, value, label) {
    return '<div class="stat-card"><div class="stat-icon">' + icon(iconName, 'icon-md') + '</div>' +
      '<div><div class="stat-value">' + value + '</div><div class="stat-label">' + label + '</div></div></div>';
  }

  function loadCompetitions() {
    const wrap = document.getElementById('compsList');
    db.ref('competitions').on('value', function (snap) {
      const data = snap.val() || {};
      const ids = Object.keys(data);

      if (ids.length === 0) {
        wrap.innerHTML = '<div class="empty-state"><div class="empty-state-icon">' + icon('trophy', 'icon-xl') + '</div><p>لا توجد مسابقات بعد. ابدأ بإضافة أول مسابقة.</p></div>';
        return;
      }

      let html = '';
      ids.forEach(function (id) {
        const c = data[id];
        const lessons = c.lessons || {};
        const lessonIds = Object.keys(lessons);
        let videoCount = 0, examCount = 0;
        lessonIds.forEach(function (lid) {
          videoCount += lessons[lid].videos ? Object.keys(lessons[lid].videos).length : 0;
          examCount += lessons[lid].exams ? Object.keys(lessons[lid].exams).length : 0;
        });

        html +=
          '<div class="admin-comp-card">' +
            '<div class="info">' +
              '<h3>' + escapeHtml(c.title || 'مسابقة') + '</h3>' +
              (c.description ? '<p>' + escapeHtml(c.description) + '</p>' : '') +
              '<div class="tags">' +
                '<span class="tag">' + icon('listCheck', 'icon-sm') + ' ' + lessonIds.length + ' محاضرة</span>' +
                '<span class="tag mix-tag video-tag">' + icon('video', 'icon-sm') + ' ' + videoCount + ' فيديو</span>' +
                '<span class="tag mix-tag">' + icon('pen', 'icon-sm') + ' ' + examCount + ' اختبار</span>' +
              '</div>' +
            '</div>' +
            '<div class="actions">' +
              '<a class="btn btn-outline btn-sm" href="competition.html?id=' + encodeURIComponent(id) + '">' + icon('pen', 'icon-sm') + ' إدارة المحاضرات</a>' +
              '<a class="btn btn-outline btn-sm" href="participants.html?id=' + encodeURIComponent(id) + '">' + icon('medal', 'icon-sm') + ' المشتركون</a>' +
              '<button class="btn btn-ghost btn-sm delete-comp-btn" data-id="' + id + '">' + icon('trash', 'icon-sm') + ' حذف</button>' +
            '</div>' +
          '</div>';
      });
      wrap.innerHTML = html;

      wrap.querySelectorAll('.delete-comp-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          if (!confirm('هل أنت متأكد من حذف هذه المسابقة نهائيًا؟ سيتم حذف كل محاضراتها وأسئلتها.')) return;
          db.ref('competitions/' + btn.dataset.id).remove();
        });
      });
    });
  }
</script>
</body>
</html>
