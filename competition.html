<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>إدارة المسابقة — لوحة تحكم أواب</title>
<link rel="icon" href="logo.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="admin-nav" id="adminNav"></nav>

<main class="admin-page">
  <a class="back-link" href="home.html" id="backLink">كل المسابقات</a>

  <div class="admin-page-head">
    <div>
      <h1 class="page-title" id="compTitle">جارٍ التحميل...</h1>
      <p class="page-sub" id="compDesc"></p>
    </div>
    <div style="display:flex; gap:8px;">
      <a class="btn btn-outline" id="participantsLink" href="#" style="width:auto;">المشتركون والنقاط</a>
      <a class="btn btn-gold" id="addLessonLink" href="#" style="width:auto;">إضافة محاضرة جديدة</a>
    </div>
  </div>

  <div id="lessonsWrap">
    <div class="center-loading"><div class="loader"></div></div>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="icons.js"></script>
<script src="admin-shell.js"></script>
<script>
  document.getElementById('backLink').innerHTML = icon('arrowRight', 'icon-sm') + ' كل المسابقات';
  document.getElementById('participantsLink').innerHTML = icon('medal', 'icon-sm') + ' المشتركون والنقاط';
  document.getElementById('addLessonLink').innerHTML = icon('plus') + ' إضافة محاضرة جديدة';

  const params = new URLSearchParams(window.location.search);
  const compId = params.get('id');
  if (!compId) window.location.href = 'home.html';

  requireAdminAuth(function () {
    renderAdminNav('home');
    document.getElementById('addLessonLink').href = 'lesson.html?comp=' + encodeURIComponent(compId);
    document.getElementById('participantsLink').href = 'participants.html?id=' + encodeURIComponent(compId);
    loadCompetition();
  });

  function loadCompetition() {
    db.ref('competitions/' + compId).on('value', function (snap) {
      if (!snap.exists()) { window.location.href = 'home.html'; return; }
      const comp = snap.val();
      document.getElementById('compTitle').textContent = comp.title || 'مسابقة';
      document.getElementById('compDesc').textContent = comp.description || '';
      renderLessons(comp.lessons || {});
    });
  }

  function renderLessons(lessons) {
    const wrap = document.getElementById('lessonsWrap');
    const ids = Object.keys(lessons);

    if (ids.length === 0) {
      wrap.innerHTML = '<div class="empty-state"><div class="empty-state-icon">' + icon('video', 'icon-xl') + '</div><p>لا توجد محاضرات بعد. أضِف المحاضرة الأولى.</p></div>';
      return;
    }

    const now = Date.now();
    let html = '';
    ids.forEach(function (lessonId, index) {
      const lesson = lessons[lessonId];
      const videoCount = lesson.videos ? Object.keys(lesson.videos).length : 0;
      const examCount = lesson.exams ? Object.keys(lesson.exams).length : 0;
      const isLive = !lesson.releaseAt || lesson.releaseAt <= now;

      html +=
        '<div class="admin-lesson-row">' +
          '<div class="info">' +
            '<div class="lesson-num">' + (index + 1) + '</div>' +
            '<div>' +
              '<h4>' + escapeHtml(lesson.title || 'محاضرة') + '</h4>' +
              '<div class="meta-row">' +
                '<span>' + icon('video', 'icon-sm') + ' ' + videoCount + ' فيديو</span>' +
                '<span>' + icon('listCheck', 'icon-sm') + ' ' + examCount + ' اختبار</span>' +
                '<span class="status-pill ' + (isLive ? 'live' : 'scheduled') + '">' +
                  icon(isLive ? 'check' : 'clock', 'icon-sm') + ' ' + (isLive ? 'منشورة الآن' : 'تُنشر في ' + formatArabicDate(lesson.releaseAt)) +
                '</span>' +
              '</div>' +
            '</div>' +
          '</div>' +
          '<div class="actions">' +
            '<a class="btn btn-outline btn-sm" href="lesson.html?comp=' + encodeURIComponent(compId) + '&lesson=' + encodeURIComponent(lessonId) + '">' + icon('pen', 'icon-sm') + ' تعديل</a>' +
            '<button class="btn btn-ghost btn-sm delete-lesson-btn" data-id="' + lessonId + '">' + icon('trash', 'icon-sm') + ' حذف</button>' +
          '</div>' +
        '</div>';
    });
    wrap.innerHTML = html;

    wrap.querySelectorAll('.delete-lesson-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        if (!confirm('حذف هذه المحاضرة بكل فيديوهاتها واختباراتها؟ لن يؤثر هذا على النقاط التي جمعها المستخدمون بالفعل.')) return;
        db.ref('competitions/' + compId + '/lessons/' + btn.dataset.id).remove();
      });
    });
  }
</script>
</body>
</html>
